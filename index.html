<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Arena Matemática</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(-45deg, #0a0f1f, #05070d, #0f2027, #1c1f3a);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    color: white;
    text-align: center;
    overflow: hidden;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

body::before {
    font-family: 'Times New Roman', serif;
    content: "∑  π  √  ∞  Δ  x²  y=f(x)\A\A\APrograma de Tutoria Discente";
    position: fixed;
    font-size: 120px;
    opacity: 0.05;
    top: 20%;
    left: 10%;
    animation: floatMath 20s linear infinite;
    pointer-events: none;
    white-space: pre;
}

@keyframes floatMath {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-50px) rotate(10deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 56px;
    margin: 20px 0;
    color: #00e5ff;
    letter-spacing: 3px;
    text-shadow: 0 0 15px #00e5ff;
}

#timer {
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 3px;
    font-size: 90px;
    margin: 10px;
    font-weight: bold;
    text-shadow: 0 0 25px currentColor;
}

input {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

#timeInput {
    width: 120px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

input {
    text-align: center;
    background: rgba(255,255,255,0.1);
    color: white;
}

.start { background: linear-gradient(135deg, #00c853, #00e676); color: black; }
.reset { background: linear-gradient(135deg, #d50000, #ff1744); color: white; }
.addTeam { background: linear-gradient(135deg, #2962ff, #448aff); color: white; }
.addPoints { background: linear-gradient(135deg, #00c853, #69f0ae); color: black; }
.removePoints { background: linear-gradient(135deg, #ff6d00, #ffab40); color: black; }

/* 🔥 NOVO BOTÃO */
#pauseBtn {
    background: linear-gradient(135deg, #ff9100, #ffc400);
    color: black;
}

button {
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 10px #00ffcc;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px;
}

.team {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 20px;
    width: 220px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    transition: 0.3s;
}

.team:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 25px rgba(0,255,255,0.6);
}

.team input[type="text"] {
    background: transparent;
    border: none;
    color: white;
    font-size: 20px;
    text-align: center;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 10px;
    font-family: 'Orbitron', sans-serif;
    outline: none;
}

.team input[type="color"] {
    margin: 10px 0;
    width: 100%;
    height: 30px;
}

.score {
    font-size: 55px;
    margin: 10px 0;
    font-weight: bold;
}

.leader {
    box-shadow: 0 0 20px gold, 0 0 40px gold;
}

/* 🔥 OVERLAY MELHORADO */
#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:#ff1744;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:120px;
    font-weight:bold;
    animation: pulse 1s infinite;
    cursor: pointer;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}
</style>
</head>

<body>

<h1>🏆 ARENA MATEMÁTICA</h1>
<div id="timer">00:00:00</div>

<input id="timeInput" type="number" placeholder="min">
<button class="start" onclick="startTimer()">Iniciar</button>
<button class="reset" onclick="resetAll()">Resetar</button>
<button id="pauseBtn" onclick="togglePause()">Pausar</button>
<button class="addTeam" onclick="addTeam()">+ Equipe</button>

<div class="container" id="teams"></div>

<!-- 🔥 AGORA CLICÁVEL -->
<div id="overlay" onclick="toggleOverlay()">⏰ TIME IS OVER</div>

<script>
let teams = [];
let totalTime = 0;
let remaining = 0;
let interval = null;
let gameActive = false;
let paused = false;

let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playBeep(freq) {
    if (!audioCtx) return;

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
    osc.stop(audioCtx.currentTime + 0.3);
}

function addTeam(){
    initAudio();
    let id = teams.length;
    teams.push({score:0});

    const div = document.createElement('div');
    div.className = 'team';
    div.id = 'team'+id;

    div.innerHTML = `
        <input type="text" value="Equipe ${id+1}">
        <input type="color" onchange="changeColor(${id}, this.value)">
        <div class="score" id="score${id}">0</div>
        <button class="addPoints" onclick="changeScore(${id},10)">+10</button>
        <button class="addPoints" onclick="changeScore(${id},5)">+5</button>
        <button class="removePoints" onclick="changeScore(${id},-10)">-10</button>
    `;

    document.getElementById('teams').appendChild(div);
}

function changeColor(id, color){
    let teamEl = document.getElementById('team'+id);

    // cor de fundo
    teamEl.style.background = color;

    // 🔥 converter HEX para RGB
    let num = parseInt(color.slice(1),16);
    let r = (num >> 16);
    let g = ((num >> 8) & 0x00FF);
    let b = (num & 0x0000FF);

    // 🔥 cálculo de brilho (padrão usado em UI)
    let brightness = (r * 299 + g * 587 + b * 114) / 1000;

    // 🔥 decide cor do texto
    let textColor = brightness > 150 ? "black" : "white";

    // aplica no card inteiro
    teamEl.style.color = textColor;

    // 🔥 aplica especificamente nos elementos internos
    let inputs = teamEl.querySelectorAll("input, .score, button");
    inputs.forEach(el => {
        el.style.color = textColor;
    });

    // borda mais escura
    let dr = Math.max(0, r - 40);
    let dg = Math.max(0, g - 40);
    let db = Math.max(0, b - 40);

    teamEl.style.border = `4px solid rgb(${dr},${dg},${db})`;
}

function changeScore(id, value){
    if(!gameActive) return;

    teams[id].score += value;
    document.getElementById('score'+id).innerText = teams[id].score;

    playBeep(value > 0 ? 800 : 400);
    updateLeader();
}

let lastLeader = -1;

function updateLeader(){
    let max = Math.max(...teams.map(t => t.score));
    let newLeader = teams.findIndex(t => t.score === max);

    teams.forEach((t, i) => {
        let el = document.getElementById('team'+i);
        el.classList.remove('leader');
        if(t.score === max && max > 0){
            el.classList.add('leader');
        }
    });

    if(newLeader !== lastLeader && lastLeader !== -1){
        playBeep(1000);
        setTimeout(()=>playBeep(1400),120);
    }

    lastLeader = newLeader;
}

function startTimer(){
    initAudio();
    if(interval) return;

    let minutes = Number(document.getElementById('timeInput').value);
    if(!minutes) return alert("Digite o tempo");

    totalTime = minutes * 60;
    remaining = totalTime;
    gameActive = true;
    paused = false;

    updateTimer();

    interval = setInterval(runTimer,1000);
}

function runTimer(){
    if(remaining <= 0){
        clearInterval(interval);
        interval = null;
        gameActive = false;

        playBeep(200);
        setTimeout(()=>playBeep(150),150);

        document.getElementById('overlay').style.display = 'flex';
        return;
    }

    remaining--;
    updateTimer();
}

function togglePause(){
    if(!interval && !paused) return;

    paused = !paused;
    gameActive = !paused;

    let btn = document.getElementById("pauseBtn");

    if(paused){
        clearInterval(interval);
        interval = null;
        btn.innerText = "Retomar";
    } else {
        btn.innerText = "Pausar";
        interval = setInterval(runTimer,1000);
    }
}

function toggleOverlay(){
    let overlay = document.getElementById('overlay');
    overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
}

function updateTimer(){
    let hrs = String(Math.floor(remaining / 3600)).padStart(2,'0');
    let min = String(Math.floor((remaining % 3600) / 60)).padStart(2,'0');
    let sec = String(remaining % 60).padStart(2,'0');

    let timerEl = document.getElementById('timer');
    timerEl.innerText = hrs + ":" + min + ":" + sec;

    // 🔥 COR DINÂMICA
    if(totalTime > 0){
        let percent = remaining / totalTime;

        if(percent > 0.5){
            timerEl.style.color = '#00ff88'; // verde
        }
        else if(percent > 0.25){
            timerEl.style.color = '#ffd600'; // amarelo
        }
        else{
            timerEl.style.color = '#ff1744'; // vermelho
        }
    }
}

function resetAll(){
    clearInterval(interval);
    interval = null;
    gameActive = false;
    paused = false;

    document.getElementById("pauseBtn").innerText = "Pausar";
    document.getElementById('timer').innerText = "00:00:00";
    document.getElementById('overlay').style.display = 'none';

    teams.forEach((t,i)=>{
        t.score = 0;
        document.getElementById('score'+i).innerText = 0;
    });
}

for(let i=0;i<4;i++) addTeam();
</script>

</body>
</html>
